# Alembic config for the survey_store SQLite database.
#
# Operators do not invoke alembic directly - the application calls
# `shared.backend.stores.migrations_runtime.apply_survey_store_migrations()`
# at lifespan startup, which builds the runtime Config object from this file
# plus an injected `sqlalchemy.url` derived from SURVEY_DATA_DIR.
#
# scripts/db_migrate.py exposes the same Config to the CLI for emergency
# manual operations (upgrade head / downgrade -1 / current / history).
#
# The placeholder `sqlite:///./_unset_.db` URL below NEVER points at a real
# database - the helper always overrides `sqlalchemy.url` before calling
# any alembic command. Keeping it set here lets alembic CLI commands like
# `alembic check` parse the config without crashing.

[alembic]
script_location = .
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = sqlite:///./_unset_placeholder_.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
