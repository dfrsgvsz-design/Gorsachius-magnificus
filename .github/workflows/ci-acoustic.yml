name: ci-acoustic

# Migrated from acoustic_platform/.github/workflows/ci.yml in 2026-06 (ticket #C,
# Batch 1 follow-up A). The original sat in a subdirectory and GitHub Actions
# never picked it up.
#
# This workflow covers acoustic_platform/ only. The corresponding species
# workflow is ci-species.yml. The cross-app PR gate is release_gate.yml.

on:
  push:
    branches:
      - main
      - master
    paths:
      - "acoustic_platform/**"
      - ".github/workflows/ci-acoustic.yml"
  pull_request:
    paths:
      - "acoustic_platform/**"
      - ".github/workflows/ci-acoustic.yml"

concurrency:
  group: ci-acoustic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: acoustic_platform/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            acoustic_platform/backend/requirements.txt
            acoustic_platform/backend/requirements-dev.txt

      - name: Install backend dependencies (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install birdnetlib

      - name: Run backend test suite (pytest)
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/acoustic_platform/backend
        run: python -m pytest tests -q --maxfail=1

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: acoustic_platform/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: acoustic_platform/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

  container-verification:
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
    defaults:
      run:
        working-directory: acoustic_platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          cp .env.example .env
          # Seed the writable backend-data bind-mount source with the contract
          # JSON files baked into the image. Without this, the empty default
          # host directory (./deploy/pilot/volumes/backend-data) masks
          # /app/backend/data inside the container at startup, causing
          # SurveyStore/TaxonomyCatalog loaders to find no protocols and the
          # /api/health endpoint to never reach 200.
          mkdir -p \
            deploy/pilot/volumes/app-data \
            deploy/pilot/volumes/backend-data/images \
            deploy/pilot/volumes/backend-data/detections \
            deploy/pilot/volumes/backend-data/survey_store \
            deploy/pilot/volumes/backend-data/taxonomy_releases \
            deploy/pilot/volumes/config \
            deploy/pilot/volumes/logs
          cp backend/data/*.json deploy/pilot/volumes/backend-data/
          # The container runs as appuser, while CI creates bind-mount sources
          # as the runner user. Make the ephemeral verification volumes writable
          # so startup can create runtime files under /app/backend/data.
          chmod -R a+rwX deploy/pilot/volumes

      - name: Build application image
        run: docker build -f Dockerfile -t biodiversity-field-survey:ci ..

      - name: Start field release stack
        run: docker compose up -d --build

      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/health; then
              exit 0
            fi
            sleep 5
          done
          echo "=== docker compose ps ==="
          docker compose ps
          echo "=== docker compose logs (tail 200) ==="
          docker compose logs --tail 200
          exit 1

      - name: Stop stack
        if: always()
        run: docker compose down -v
