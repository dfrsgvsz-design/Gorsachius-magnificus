name: release-gate

# Required check before merging to main and before any tag-driven release.
# Mirrors the local `quality_gate.ps1` + `release_gate.ps1` behaviour for both apps.
#
# Branch protection setup (repo Settings → Branches → main):
#   - Require status check: "Release Gate · all gates green"
#   - Require pull request reviews before merging
#
# Tag/release flow:
#   - android-release.yml has `needs: release-gate` so a v* tag cannot publish
#     an AAB unless this workflow has run green on the tagged commit.

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-contract-gate:
    name: Quality Gate · production runtime contract (no demo mode)
    runs-on: ubuntu-latest
    # Repo-wide gate: stages the env vars that satisfy the no-demo contract
    # introduced in Batch A (P0 W1) and asserts:
    #   * runtime_paths.describe_runtime_paths() reports all four
    #     `*_externalized` flags as True
    #   * shared/backend/utils/data/platform_config.json loads and has a
    #     non-empty platform.name
    # If either check regresses, no deploy artifact is allowed downstream.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # No package install needed — runtime_paths + platform_config are
      # pure-stdlib modules. Keeping this lightweight on purpose so a busy
      # PR queue doesn't choke on heavyweight installs just for the gate.
      - name: Production runtime contract assertion
        env:
          # Match what scripts/release_gate.ps1's "Production runtime contract"
          # step stages locally so the two gates produce identical signals.
          APP_ENV: production
          BIRD_API_KEY: release-gate-ci-key
          CORS_ORIGINS: https://example.com
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/bird_platform_release_gate_stage"
          mkdir -p "$STAGE/data" "$STAGE/checkpoints" "$STAGE/frontend_dist"
          export SURVEY_DATA_DIR="$STAGE/data"
          export CHECKPOINTS_DIR="$STAGE/checkpoints"
          export FRONTEND_DIST_DIR="$STAGE/frontend_dist"
          export BIRD_PLATFORM_OUTPUT_DIR="$STAGE/data"
          # Single source of truth: scripts/assert_runtime_contract.py.
          # release_gate.ps1 delegates to the same script so local + CI
          # never drift.
          python "${GITHUB_WORKSPACE}/scripts/assert_runtime_contract.py"

  backend-gate:
    name: Quality Gate · ${{ matrix.app }} backend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - acoustic_platform
          - species_monitoring_platform
    defaults:
      run:
        working-directory: ${{ matrix.app }}/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            ${{ matrix.app }}/backend/requirements.txt
            ${{ matrix.app }}/backend/requirements-dev.txt

      - name: Install backend dependencies (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Backend syntax check (compileall)
        run: python -m compileall .

      - name: Backend lint (ruff critical rules)
        run: python -m ruff check . --select E9,F63,F7,F82

      - name: Backend critical tests (smoke/runtime/realtime)
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/${{ matrix.app }}/backend
        run: |
          # test_health_runtime.py is A's canonical /api/health contract guard
          # (8 assertions covering deployment_ready / mode / blocking_codes /
          # runtime_paths.*_externalized). Per A's reply 2026-06, this is the
          # authoritative production-runtime-contract check at the unit-test
          # layer; the e2e workflow re-asserts the same contract over HTTP.
          python -m pytest \
            tests/test_api_smoke.py \
            tests/test_health_runtime.py \
            tests/test_realtime.py \
            -q --maxfail=1 --cov=. --cov-report=term-missing

      - name: Full backend pytest suite (release verification)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/${{ matrix.app }}/backend
        run: python -m pytest tests -q --maxfail=3 --cov=. --cov-report=xml --cov-report=term

      - name: "POST /api/surveys/projects no-503 SLO (200 reqs)"
        # Mirrors the local release_gate.ps1 SLO check. Spins a FastAPI
        # TestClient that runs the full lifespan (so survey_store /
        # detection_store / taxonomy_catalog are asserted live), fires 200
        # sequential POST /api/surveys/projects, fails the gate if ANY
        # response is 503/500 or any reply is missing X-Request-ID.
        # This is the same regression net that caught the
        # `_LIFESPAN_REQUIRED_STORES = ("detection_store", ...)` typo bug
        # that would otherwise have shipped to production.
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/${{ matrix.app }}/backend
        run: |
          # The script encodes which platform to load from its first positional
          # arg ("species" / "acoustic"). Map matrix.app → platform key.
          case "${{ matrix.app }}" in
            "species_monitoring_platform") PLATFORM_KEY="species" ;;
            "acoustic_platform")           PLATFORM_KEY="acoustic" ;;
            *) echo "::error::Unknown matrix.app=${{ matrix.app }}"; exit 1 ;;
          esac
          python "${{ github.workspace }}/scripts/pressure_test_projects.py" \
            "$PLATFORM_KEY" --requests 200

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.app }}
          if-no-files-found: ignore
          path: ${{ matrix.app }}/backend/coverage.xml

  frontend-gate:
    name: Quality Gate · ${{ matrix.app }} frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - acoustic_platform
          - species_monitoring_platform
    defaults:
      run:
        working-directory: ${{ matrix.app }}/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint --silent

      - name: Frontend unit tests
        run: npm run test --silent --if-present

      - name: Frontend production build
        run: npm run build --silent

  release-gate-summary:
    name: Release Gate · all gates green
    runs-on: ubuntu-latest
    needs:
      - runtime-contract-gate
      - backend-gate
      - frontend-gate
    if: always()
    steps:
      - name: Aggregate result
        run: |
          contract="${{ needs.runtime-contract-gate.result }}"
          backend="${{ needs.backend-gate.result }}"
          frontend="${{ needs.frontend-gate.result }}"
          if [ "$contract" != "success" ] || [ "$backend" != "success" ] || [ "$frontend" != "success" ]; then
            echo "::error::release-gate FAILED — runtime-contract=$contract, backend=$backend, frontend=$frontend"
            exit 1
          fi
          echo "release-gate PASSED — safe to merge to main / proceed to android-release"
