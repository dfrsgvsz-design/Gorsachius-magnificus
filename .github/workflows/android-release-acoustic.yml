name: android-release-acoustic

# Acoustic-platform release pipeline. Mirrors `.github/workflows/android-release.yml`
# (species) with mechanical substitutions so the two apps can be tagged and shipped
# independently without ever sharing a signing key.
#
# Trigger: push a tag like v-acoustic-1.0.0, or run manually from the Actions tab.
# IMPORTANT: signed-release is gated by an in-workflow release-gate job that
# mirrors release_gate.yml's critical subset for the acoustic backend/frontend.
# Tags that don't pass the gate cannot publish artefacts.
#
# Required repository secrets (PM to add — distinct from ANDROID_* used by
# species, so a compromised acoustic key can never sign a species release and
# vice versa):
#   ACOUSTIC_KEYSTORE_BASE64    base64 of acoustic-platform-release.jks
#   ACOUSTIC_KEYSTORE_PASSWORD  keystore password
#   ACOUSTIC_KEY_ALIAS          key alias (acousticplatform-release)
#   ACOUSTIC_KEY_PASSWORD       key password (same as keystore password for PKCS12)
#
# Tag naming convention:
#   v-acoustic-X.Y.Z   ships acoustic only
#   v-species-X.Y.Z    ships species only  (handled by android-release.yml)
# The on.push.tags filter below restricts this workflow to the v-acoustic- prefix
# so a stray ``v1.0.0`` does not double-trigger both pipelines.

on:
  workflow_dispatch:
  push:
    tags:
      - "v-acoustic-*"

concurrency:
  group: android-release-acoustic-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Release Gate (acoustic tag precheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            acoustic_platform/backend/requirements.txt
            acoustic_platform/backend/requirements-dev.txt

      - name: Install backend dependencies (runtime + dev)
        working-directory: acoustic_platform/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Backend syntax check
        working-directory: acoustic_platform/backend
        run: python -m compileall .

      - name: Backend lint (ruff critical rules)
        working-directory: acoustic_platform/backend
        run: python -m ruff check . --select E9,F63,F7,F82

      - name: Backend critical tests
        working-directory: acoustic_platform/backend
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/acoustic_platform/backend
        run: |
          python -m pytest \
            tests/test_api_smoke.py \
            tests/test_health_runtime.py \
            tests/test_realtime.py \
            -q --maxfail=1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: acoustic_platform/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: acoustic_platform/frontend
        run: npm ci

      - name: Frontend lint
        working-directory: acoustic_platform/frontend
        run: npm run lint --silent

      - name: Frontend production build
        working-directory: acoustic_platform/frontend
        run: npm run build --silent

  signed-release:
    needs: release-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: acoustic_platform/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: acoustic_platform/frontend/package-lock.json

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build web assets and sync Android project
        run: npm run build:android

      - name: Restore release keystore from secret
        run: printf '%s' "$ACOUSTIC_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
        env:
          ACOUSTIC_KEYSTORE_BASE64: ${{ secrets.ACOUSTIC_KEYSTORE_BASE64 }}

      - name: Build signed AAB and APK
        working-directory: acoustic_platform/frontend/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease
        env:
          # The Gradle signingConfig keys below intentionally reuse the
          # ANDROID_* env var names so the build.gradle config can be
          # source-shared between the two apps. The actual SECRET names
          # diverge (ACOUSTIC_KEYSTORE_* / ANDROID_KEYSTORE_*) so the two
          # apps never share a signing key.
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ACOUSTIC_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ACOUSTIC_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ACOUSTIC_KEY_PASSWORD }}

      - name: Verify signatures
        working-directory: acoustic_platform/frontend/android
        run: |
          jarsigner -verify app/build/outputs/bundle/release/app-release.aab
          jarsigner -verify app/build/outputs/apk/release/app-release.apk

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: acoustic-platform-release-${{ github.ref_name }}
          if-no-files-found: error
          path: |
            acoustic_platform/frontend/android/app/build/outputs/bundle/release/app-release.aab
            acoustic_platform/frontend/android/app/build/outputs/apk/release/app-release.apk
            acoustic_platform/frontend/android/app/build/outputs/mapping/release/mapping.txt
