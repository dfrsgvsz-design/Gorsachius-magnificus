name: deps-audit

# Weekly dependency vulnerability scan for both apps (npm + pip ecosystems).
# Created 2026-06-10 (ticket #C continuous deps hygiene).
#
# Triggers:
#   - cron: every Monday 02:00 UTC (= Monday 10:00 China)
#   - manual via Actions tab
#   - on push to scripts/weekly_deps_audit.ps1 or this workflow (smoke-test)
#
# Behaviour:
#   - Runs scripts/weekly_deps_audit.ps1 in pwsh on ubuntu-latest.
#   - Uploads the generated submission/weekly_deps_report_<date>.md.
#   - If HIGH/CRITICAL findings exist, the script exits non-zero, the job
#     fails, and we open (or update) a GitHub issue labelled "deps-audit"
#     so the on-call engineer can't miss it.

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
  push:
    paths:
      - "scripts/weekly_deps_audit.ps1"
      - ".github/workflows/deps-audit.yml"

permissions:
  contents: read
  issues: write

concurrency:
  group: deps-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Weekly deps audit
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: python -m pip install --disable-pip-version-check pip-audit

      - name: Prepare npm lockfiles
        run: |
          for app in acoustic_platform species_monitoring_platform; do
            if [ ! -f "$app/frontend/package-lock.json" ]; then
              echo "Generating package-lock.json for $app..."
              (cd "$app/frontend" && npm install --package-lock-only --no-audit --silent)
            fi
          done

      - name: Run weekly deps audit
        id: audit
        shell: pwsh
        run: |
          ./scripts/weekly_deps_audit.ps1 -NoInstall
          $code = $LASTEXITCODE
          "exit_code=$code" >> $env:GITHUB_OUTPUT
          # Don't fail the step yet; we want the upload + issue steps to run first.
          exit 0

      - name: Locate today's report
        id: report
        shell: bash
        run: |
          report=$(ls -1 submission/weekly_deps_report_*.md 2>/dev/null | sort | tail -n 1 || true)
          echo "path=$report" >> "$GITHUB_OUTPUT"
          echo "Report path: $report"

      - name: Upload report artifact
        if: steps.report.outputs.path != ''
        uses: actions/upload-artifact@v4
        with:
          name: weekly-deps-report
          if-no-files-found: ignore
          path: ${{ steps.report.outputs.path }}

      - name: Open / update issue on HIGH/CRITICAL findings
        if: steps.audit.outputs.exit_code != '0' && steps.report.outputs.path != ''
        uses: actions/github-script@v7
        env:
          REPORT_PATH: ${{ steps.report.outputs.path }}
        with:
          script: |
            const fs = require('fs');
            const path = process.env.REPORT_PATH;
            const body = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : '_(report file missing)_';
            const today = new Date().toISOString().slice(0, 10);
            const title = `[deps-audit] HIGH/CRITICAL findings — ${today}`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deps-audit',
              state: 'open',
              per_page: 10,
            });

            const todayIssue = existing.data.find(i => i.title === title);
            if (todayIssue) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: todayIssue.number,
                body: `Re-run found findings again. Latest report follows:\n\n${body}`,
              });
              core.info(`Updated existing issue #${todayIssue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                labels: ['deps-audit', 'P0'],
                body: `> Generated by \`.github/workflows/deps-audit.yml\` weekly cron.\n\n${body}`,
              });
              core.info(`Created issue #${created.data.number}`);
            }

      - name: Fail job if HIGH/CRITICAL were found
        if: steps.audit.outputs.exit_code != '0'
        run: |
          echo "::error::weekly_deps_audit.ps1 exited ${{ steps.audit.outputs.exit_code }} — see uploaded report and tracking issue."
          exit 1
