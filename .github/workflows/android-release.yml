name: android-release

# Migrated from species_monitoring_platform/.github/workflows/android-release.yml
# in 2026-06 (ticket #C, Batch 1 follow-up A) so GitHub Actions actually runs it.
#
# Produces a Play-Store-ready signed AAB (+ signed APK for sideload regression)
# for species_monitoring_platform. Trigger: push a tag like v1.0.0 (or
# v-species-1.0.0 once acoustic also ships its own release pipeline), or run
# manually from the Actions tab.
#
# IMPORTANT: signed-release is gated by an in-workflow release-gate job that
# mirrors release_gate.yml's critical subset. Tags that don't pass the gate
# cannot publish artefacts.
#
# Required repository secrets:
#   ANDROID_KEYSTORE_BASE64    base64 of species-monitoring-release.jks
#   ANDROID_KEYSTORE_PASSWORD  keystore password
#   ANDROID_KEY_ALIAS          key alias (speciesmonitoring-release)
#   ANDROID_KEY_PASSWORD       key password (same as keystore password for PKCS12)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Release Gate (tag precheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            species_monitoring_platform/backend/requirements.txt
            species_monitoring_platform/backend/requirements-dev.txt

      - name: Install backend dependencies (runtime + dev)
        working-directory: species_monitoring_platform/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Backend syntax check
        working-directory: species_monitoring_platform/backend
        run: python -m compileall .

      - name: Backend lint (ruff critical rules)
        working-directory: species_monitoring_platform/backend
        run: python -m ruff check . --select E9,F63,F7,F82

      - name: Backend critical tests
        working-directory: species_monitoring_platform/backend
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/species_monitoring_platform/backend
        run: |
          python -m pytest \
            tests/test_api_smoke.py \
            tests/test_health_runtime.py \
            tests/test_realtime.py \
            -q --maxfail=1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: species_monitoring_platform/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: species_monitoring_platform/frontend
        run: npm ci

      - name: Frontend lint
        working-directory: species_monitoring_platform/frontend
        run: npm run lint --silent

      - name: Frontend production build
        working-directory: species_monitoring_platform/frontend
        run: npm run build --silent

  signed-release:
    needs: release-gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: species_monitoring_platform/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: species_monitoring_platform/frontend/package-lock.json

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build web assets and sync Android project
        run: npm run build:android

      - name: Restore release keystore from secret
        run: printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build signed AAB and APK
        working-directory: species_monitoring_platform/frontend/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease assembleRelease
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Verify signatures
        working-directory: species_monitoring_platform/frontend/android
        run: |
          jarsigner -verify app/build/outputs/bundle/release/app-release.aab
          jarsigner -verify app/build/outputs/apk/release/app-release.apk

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: species-monitoring-release-${{ github.ref_name }}
          if-no-files-found: error
          path: |
            species_monitoring_platform/frontend/android/app/build/outputs/bundle/release/app-release.aab
            species_monitoring_platform/frontend/android/app/build/outputs/apk/release/app-release.apk
            species_monitoring_platform/frontend/android/app/build/outputs/mapping/release/mapping.txt
