name: ci-species

# Migrated from species_monitoring_platform/.github/workflows/ci.yml in 2026-06
# (ticket #C, Batch 1 follow-up A). The original sat in a subdirectory and
# GitHub Actions never picked it up.
#
# This workflow covers species_monitoring_platform/ only. The corresponding
# acoustic workflow is ci-acoustic.yml. The cross-app PR gate is release_gate.yml.

on:
  push:
    branches:
      - main
      - master
    paths:
      - "species_monitoring_platform/**"
      - ".github/workflows/ci-species.yml"
  pull_request:
    paths:
      - "species_monitoring_platform/**"
      - ".github/workflows/ci-species.yml"

concurrency:
  group: ci-species-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: species_monitoring_platform/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            species_monitoring_platform/backend/requirements.txt
            species_monitoring_platform/backend/requirements-dev.txt

      - name: Install backend dependencies (runtime + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
          pip install birdnetlib

      - name: Run backend test suite (pytest)
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/species_monitoring_platform/backend
        run: python -m pytest tests -q --maxfail=1

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: species_monitoring_platform/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: species_monitoring_platform/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  container-verification:
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build
    defaults:
      run:
        working-directory: species_monitoring_platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        run: cp .env.example .env

      - name: Prepare writable compose volumes
        run: |
          mkdir -p \
            deploy/pilot/volumes/app-data \
            deploy/pilot/volumes/backend-data \
            deploy/pilot/volumes/config \
            deploy/pilot/volumes/logs \
            deploy/pilot/volumes/output \
            deploy/pilot/volumes/runtime
          cp -a backend/data/. deploy/pilot/volumes/backend-data/
          cp backend/data/platform_config.json deploy/pilot/volumes/app-data/platform_config.json
          chmod -R a+rwx deploy/pilot/volumes

      - name: Build application image
        working-directory: ${{ github.workspace }}
        run: docker build -t biodiversity-field-survey:ci -f species_monitoring_platform/Dockerfile .

      - name: Start field release stack
        working-directory: species_monitoring_platform
        run: docker compose up -d --build

      - name: Wait for health endpoint
        working-directory: species_monitoring_platform
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs
          exit 1

      - name: Stop stack
        if: always()
        working-directory: species_monitoring_platform
        run: docker compose down -v
